networks:
  fontaine:
    driver: bridge
services:
  energy-node:
    networks:
      - fontaine
    build: ./node
    depends_on:
      arkhe-core:
        condition: service_healthy
    env_file:
      - .env
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
  
  arkhe-core:
    networks:
      - fontaine
    image: redis:alpine
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  monitoring-terminal:
    networks:
      - fontaine
    image: nginx:alpine
    ports:
      - "7070:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - energy-node

volumes:
  redis-data:
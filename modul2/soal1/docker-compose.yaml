services:
  energy-node:
    build: ./node
    container_name: energy-node
    depends_on:
      - arkhe-core
    env_file:
      - .env
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    networks:
      - fontaine
  
  arkhe-core:
    image: redis:alpine
    container_name: arkhe-core
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - fontaine

  monitoring-terminal:
    container_name: monitoring-terminal
    image: nginx:alpine
    ports:
      - "7070:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - energy-node
    networks:
      - fontaine

volumes:
  redis-data:

networks:
  fontaine:
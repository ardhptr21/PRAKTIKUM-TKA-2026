- name: App directory
  file:
    path: "{{ app_dir }}"
    state: directory

- name: Copy frontend source
  copy:
    src: "{{ playbook_dir }}/sources/frontend/"
    dest: "{{ app_dir }}"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: '0755'

- name: Copy dockerfile
  copy:
    src: Dockerfile
    dest: "{{ app_dir }}/Dockerfile"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: '0644'

- name: Gen config.js
  template:
    src: config.js.j2
    dest: "{{ app_dir }}/config.js"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: '0644'

- name: Gen compose
  template:
    src: docker-compose.yaml.j2
    dest: "{{ app_dir }}/docker-compose.yaml"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: '0644'

- name: Open port
  ufw:
    rule: allow
    port: "{{ frontend_port }}"
    proto: tcp

- name: Run docker compose
  community.docker.docker_compose_v2:
    project_src: "{{ app_dir }}"
    state: present

- name: Wait until up
  uri:
    url: "http://localhost:{{ frontend_port }}/"
    status_code: 200
    timeout: 30
  register: health_check
  until: health_check.status == 200
  retries: 5
  delay: 5
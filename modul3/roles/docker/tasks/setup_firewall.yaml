- name: Install ufw
  apt:
    name: ufw
    state: present
    update_cache: yes

- name: Allow SSH
  ufw:
    rule: allow
    port: 22
    proto: tcp

- name: Default deny incoming
  ufw:
    default: deny
    direction: incoming

- name: Default allow outgoing
  ufw:
    default: allow
    direction: outgoing

- name: Enable ufw
  ufw:
    state: enabled